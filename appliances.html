<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appliances - PowerHouse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <nav class="sidebar">
        <div class="sidebar-brand"><span class="text-green">Power</span>House</div>
        <ul class="sidebar-links">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="#">📄 My Bills</a></li>
            <li><a href="#" class="active">🔌 Appliances</a></li>
            <li><a href="#">⚙️ Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="index.html">Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="dashboard-header">
            <h2>Appliance Audit</h2>
        </header>

        <div class="chart-container" style="height: auto; margin-bottom: 2rem;">
            <h3>Add New Appliance</h3>
            <form id="applianceForm" style="display: flex; gap: 1rem; align-items: flex-end; margin-top: 1.5rem;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>Appliance Name</label>
                    <input type="text" id="appName" placeholder="e.g. Air Conditioner" required>
                </div>
                <div class="form-group" style="width: 150px; margin-bottom: 0;">
                    <label>Wattage (W)</label>
                    <input type="number" id="appWatts" placeholder="e.g. 1500" required>
                </div>
                <div class="form-group" style="width: 150px; margin-bottom: 0;">
                    <label>Hours/Day</label>
                    <input type="number" id="appHours" placeholder="e.g. 8" required>
                </div>
                <button type="submit" class="btn-primary" style="height: 50px;">Calculate</button>
            </form>
        </div>

        <div class="chart-container" style="height: auto;">
            <h3>Your Power Hogs</h3>
            <table style="width: 100%; margin-top: 1rem; border-collapse: collapse;">
                <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #f4f7f6;">
                        <th style="padding: 1rem;">Appliance</th>
                        <th style="padding: 1rem;">Daily Consumption</th>
                        <th style="padding: 1rem;">Monthly Cost (Est.)</th>
                        <th style="padding: 1rem;">Action</th>
                    </tr>
                </thead>
                <tbody id="applianceList">
                </tbody>
            </table>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
