<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PowerHouse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-body">

    <nav class="sidebar">
        <div class="sidebar-brand"><span class="text-green">Power</span>House</div>
        <ul class="sidebar-links">
            <li><a href="#" class="active">📊 Dashboard</a></li>
            <li><a href="#">📄 My Bills</a></li>
            <li><a href="appliances.html">🔌 Appliances</a></li>
            <li><a href="#">⚙️ Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="index.html">Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="dashboard-header">
            <h2>Overview</h2>
            <button class="btn-primary">+ Add New Bill</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Last Month's Bill</h3>
                <p class="stat-number">₹ 2,450</p>
                <span class="stat-trend negative">↑ 12% vs last month</span>
            </div>
            <div class="stat-card">
                <h3>Total Units</h3>
                <p class="stat-number">320 kWh</p>
                <span class="stat-trend neutral">Tier 2 Pricing</span>
            </div>
            <div class="stat-card">
                <h3>Est. Savings</h3>
                <p class="stat-number">₹ 450</p>
                <span class="stat-trend positive">Potential savings</span>
            </div>
        </div>

        <div class="chart-container">
            <h3>Consumption History</h3>
            <canvas id="usageChart"></canvas>
        </div>
    </main>
<div id="addBillModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Add New Bill</h2>
        <form id="addBillForm">
            <div class="form-group">
                <label>Month</label>
                <input type="month" required>
            </div>
            <div class="form-group">
                <label>Units Consumed (kWh)</label>
                <input type="number" placeholder="e.g. 320" required>
            </div>
            <div class="form-group">
                <label>Total Bill Amount (₹)</label>
                <input type="number" placeholder="e.g. 2450" required>
            </div>
            <div class="form-group">
                <label>Upload Bill Image (Optional)</label>
                <input type="file" accept="image/*,.pdf">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Save Bill</button>
        </form>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
