<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PowerHouse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your details to access your dashboard.</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <p class="footer-text">Don't have an account? <a href="#">Sign up</a></p>
        <p class="footer-text"><a href="index.html">← Back to Home</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
