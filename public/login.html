<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PowerHouse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-container">
        <div style="margin-bottom: 2rem;">
            <p style="font-size: 1rem; color: var(--color-accent); font-weight: 600; margin-bottom: 0.75rem;">PowerHouse.</p>
            <h2>Welcome back.</h2>
            <p class="subtitle" style="margin-top: 0.5rem; margin-bottom: 0;">Enter your credentials to continue, or create a new account.</p>
        </div>

        <form id="authForm">
            <div class="form-group">
                <label for="authEmail">Email</label>
                <input type="email" id="authEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="authPassword">Password</label>
                <input type="password" id="authPassword" placeholder="••••••••" required>
            </div>

            <button type="button" id="loginBtn" class="btn-primary" style="width: 100%; margin-bottom: 0.75rem; border-radius: 12px;">Sign In</button>
            <button type="button" id="signupBtn" class="btn-primary btn-secondary" style="width: 100%; border-radius: 12px;">Create Account</button>
        </form>

        <p id="authMessage" style="color: var(--color-penalty); text-align: center; margin-top: 1.2rem; font-weight: 500; font-size: 0.9rem; min-height: 20px;"></p>

        <p class="footer-text"><a href="index.html">← Back to Home</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
