<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - PowerHouse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="ambient-bg ambient-landing"></div>
    <div class="login-container">
        <h2>Welcome to <span class="text-green">Power</span>House</h2>
        <p class="subtitle">Enter your details to access your dashboard or create a new account.</p>
        
        <form id="authForm">
            <div class="form-group">
                <label for="authEmail">Email Address</label>
                <input type="email" id="authEmail" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="authPassword">Password</label>
                <input type="password" id="authPassword" placeholder="••••••••" required>
            </div>
            
            <button type="button" id="loginBtn" class="btn-primary" style="width: 100%; margin-bottom: 12px;">Sign In</button>
            <button type="button" id="signupBtn" class="btn-primary btn-secondary" style="width: 100%;">Create Account</button>
        </form>
        
        <p id="authMessage" style="color: #e74c3c; text-align: center; margin-top: 15px; font-weight: 600; min-height: 20px;"></p>

        <p class="footer-text"><a href="index.html">← Back to Home</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
